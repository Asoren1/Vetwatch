services:
  - type: web
    name: vetwatch
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false    # set this in the Render dashboard, do not commit
      - key: CLAUDE_MODEL
        value: claude-haiku-4-5-20251001
      - key: PYTHON_VERSION
        value: 3.12.7
